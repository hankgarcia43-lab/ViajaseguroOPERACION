services:
  - type: web
    name: viajasegurooperacion-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: viajasegurooperacion-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_SUPERUSER_MODE
        value: false
      - key: AUTO_APPROVE_DRIVERS
        value: false
      - key: ENABLE_DEV_DRIVER_AUTO_APPROVE_BYPASS
        value: false
      - key: ALLOW_DEV_PAYMENT_SIMULATION
        value: false
      - key: MERCADOPAGO_PAYMENT_LINK
        value: https://link.mercadopago.com.mx/viajaseguro2026
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADOPAGO_USE_SANDBOX
        value: false
      - key: MANUAL_PAYMENT_METHOD_LABEL
        value: Transferencia bancaria empresarial
      - key: MANUAL_PAYMENT_BENEFICIARY
        sync: false
      - key: MANUAL_PAYMENT_BUSINESS_ACCOUNT
        sync: false
      - key: MANUAL_PAYMENT_PROCESSOR_LABEL
        value: VIAJA SEGURO
      - key: MANUAL_PAYMENT_REFERENCE
        value: VS-RESERVA
      - key: MANUAL_PAYMENT_INSTRUCTIONS
        sync: false

databases:
  - name: viajasegurooperacion-db
    databaseName: viaja_seguro
    user: viaja_seguro
    plan: free
