services:
  - type: web
    name: viajasegurooperacion-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Configure this in Render with the Neon PostgreSQL URL. Do not use the old dpg-* Render internal database host and do not commit real secrets.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_SUPERUSER_MODE
        value: false
      - key: AUTO_APPROVE_DRIVERS
        value: false
      - key: ENABLE_DEV_DRIVER_AUTO_APPROVE_BYPASS
        value: false
      - key: ALLOW_DEV_PAYMENT_SIMULATION
        value: false
      - key: MERCADOPAGO_PAYMENT_LINK
        value: https://link.mercadopago.com.mx/viajaseguro2026
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADOPAGO_USE_SANDBOX
        value: false
      - key: MANUAL_PAYMENT_PROCESSOR_LABEL
        value: Mercado Pago
      - key: MANUAL_PAYMENT_REFERENCE
        value: VIAJA SEGURO
